name: Update Cartoes Expirados Dashboard → GCS

on:
  schedule:
    - cron: '0 12 * * 1-5'   # 09:00 BRT = 12:00 UTC, seg-sex
    - cron: '0 14 * * 1-5'   # 11:00 BRT = 14:00 UTC, seg-sex
  workflow_dispatch:

env:
  GCS_URL: https://storage.googleapis.com/meli-sandbox/CARDSINDICATORSBR/dashboards_TDMP_MLB/cartoes_expirados.html

jobs:
  update-and-publish:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install dependencies
        run: |
          pip install --quiet \
            google-cloud-bigquery \
            google-cloud-storage \
            google-auth \
            requests \
            pandas \
            db-dtypes

      - name: Configure GCP credentials (personal OAuth)
        run: |
          mkdir -p ~/.config/gcloud
          echo '${{ secrets.GCP_CREDENTIALS }}' > ~/.config/gcloud/application_default_credentials.json

      - name: Update data from BigQuery
        run: python scripts/update_data.py

      - name: Publish to GCS
        run: python publicar_gcs.py

      - name: Summary
        run: |
          echo "## ✅ Dashboard atualizado" >> $GITHUB_STEP_SUMMARY
          echo "**URL:** ${{ env.GCS_URL }}" >> $GITHUB_STEP_SUMMARY
          echo "**Data:** $(date -u +'%d/%m/%Y %H:%M UTC')" >> $GITHUB_STEP_SUMMARY
