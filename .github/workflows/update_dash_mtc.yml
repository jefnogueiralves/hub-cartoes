name: Update Dashboard Micro TC MLB

on:
  schedule:
    - cron: '0 12 * * 1-5'   # 09:00 BRT (UTC-3) = 12:00 UTC, seg-sex
  workflow_dispatch:           # permite rodar manualmente pelo GitHub UI

permissions:
  contents: write              # necessário para git push via github.token

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 35

    steps:
      - name: Checkout repositório
        uses: actions/checkout@v4
        # usa github.token nativo — não precisa de GH_PAT

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Instalar dependências Python
        run: |
          pip install --quiet \
            google-cloud-bigquery \
            google-cloud-storage \
            google-auth \
            pyarrow \
            db-dtypes

      - name: Criar SA key file
        run: echo '${{ secrets.GCP_SA_KEY }}' > /tmp/sa_key.json

      - name: Executar atualização do dashboard
        env:
          GOOGLE_APPLICATION_CREDENTIALS: /tmp/sa_key.json
          OUTPUT_DIR: /tmp/dash_output
        run: |
          python scripts/update_gcs.py 2>&1 | tee /tmp/update.log
          echo "--- Últimas linhas ---"
          tail -5 /tmp/update.log

      - name: Commit se houve alteração
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git diff --quiet && echo "Sem alterações" || \
            (git add -A && \
             git commit -m "auto: Micro TC MLB $(TZ='America/Sao_Paulo' date '+%d/%m/%Y %H:%M')" && \
             git push)

      - name: Limpar SA key
        if: always()
        run: rm -f /tmp/sa_key.json
