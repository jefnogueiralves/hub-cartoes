name: Update Dashboard Micro TC MLB

on:
  schedule:
    - cron: '0 12 * * 1-5'   # 09:00 BRT (UTC-3) = 12:00 UTC, seg-sex
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 35

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Instalar dependencias
        run: |
          pip install --quiet \
            google-cloud-bigquery \
            google-cloud-storage \
            google-auth \
            google-auth-oauthlib \
            pyarrow \
            db-dtypes \
            requests

      - name: Configurar credenciais GCP (ADC)
        env:
          GCP_ADC_JSON: ${{ secrets.GCP_ADC_JSON }}
        run: |
          mkdir -p ~/.config/gcloud
          echo "$GCP_ADC_JSON" > ~/.config/gcloud/application_default_credentials.json
          python3 -c "import json,sys; json.load(open(sys.argv[1])); print('Credenciais OK')" \
            ~/.config/gcloud/application_default_credentials.json

      - name: Executar atualizacao do dashboard
        env:
          GOOGLE_APPLICATION_CREDENTIALS: /home/runner/.config/gcloud/application_default_credentials.json
          OUTPUT_DIR: /tmp/dash_output
        run: |
          python scripts/update_gcs.py 2>&1 | tee /tmp/update.log
          tail -5 /tmp/update.log

      - name: Commit se houve alteracao
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git diff --quiet && echo "Sem alteracoes" || \
            (git add -A && \
             git commit -m "auto: Micro TC MLB $(TZ='America/Sao_Paulo' date '+%d/%m/%Y %H:%M')" && \
             git push)

      - name: Limpar credenciais
        if: always()
        run: rm -f ~/.config/gcloud/application_default_credentials.json
