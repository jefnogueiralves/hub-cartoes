name: Atualizar Cartões Expirados + MTC + Hub
on:
  schedule:
    - cron: '30 12 * * 1-5'   # 09:30 BRT (seg–sex) — após o TD ter rodado
  workflow_dispatch:
env:
  GOOGLE_APPLICATION_CREDENTIALS: /home/runner/.config/gcloud/application_default_credentials.json
jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar dependências
        run: |
          pip install --quiet -r requirements.txt
          pip install --quiet playwright
          playwright install chromium --with-deps

      - name: Configurar credenciais GCP
        env:
          GCP_ADC_JSON: ${{ secrets.GCP_ADC_JSON }}
        run: |
          mkdir -p ~/.config/gcloud
          echo "$GCP_ADC_JSON" > ~/.config/gcloud/application_default_credentials.json

      # ── Cartões Expirados ──────────────────────────────────────────────────
      - name: Cartões Expirados — Extrair BQ
        run: python cartoes-expirados/update_data.py

      - name: Cartões Expirados — Publicar Grid
        run: python publicar_grid_hub.py
        continue-on-error: true
        env:
          GRID_SESSION_ID: ${{ secrets.GRID_SESSION_ID }}
          GRID_DOC_ID: ${{ secrets.GRID_DOC_ID_EXPIRADOS }}
          GRID_HTML_FILE: cartoes_expirados.html

      # ── Micro TC ───────────────────────────────────────────────────────────
      - name: Micro TC — Gerar estático
        run: python micro-tc/gerar_estatico.py

      - name: Micro TC — Publicar Grid
        run: python publicar_grid_hub.py
        continue-on-error: true
        env:
          GRID_SESSION_ID: ${{ secrets.GRID_SESSION_ID }}
          GRID_DOC_ID: ${{ secrets.GRID_DOC_ID_MTC }}
          GRID_HTML_FILE: micro_tc_mlb.html

      # ── Hub ────────────────────────────────────────────────────────────────
      - name: Hub — Publicar Grid
        run: python publicar_grid_hub.py
        continue-on-error: true
        env:
          GRID_SESSION_ID: ${{ secrets.GRID_SESSION_ID }}
          GRID_DOC_ID: ${{ secrets.GRID_DOC_ID_HUB }}
          GRID_HTML_FILE: hub_cartoes.html

      # ── Resumo ─────────────────────────────────────────────────────────────
      - name: Resumo
        run: |
          echo "## Dashboards atualizados" >> $GITHUB_STEP_SUMMARY
          echo "| Dashboard | URL |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| Cartões Expirados | https://grid.adminml.com/d/01KPZTMZJT17437KWRNKDGE0AQ/view |" >> $GITHUB_STEP_SUMMARY
          echo "| Micro TC | https://grid.adminml.com/d/01KNKWTT76QHEZ9EJ88G3KDNME/view |" >> $GITHUB_STEP_SUMMARY
          echo "| Hub Cartões | https://grid.adminml.com/d/01KS7VFYAZF80APGT36Q5NPJWR/view |" >> $GITHUB_STEP_SUMMARY
          echo "| **Data** | $(date -u +'%d/%m/%Y %H:%M UTC') |" >> $GITHUB_STEP_SUMMARY
